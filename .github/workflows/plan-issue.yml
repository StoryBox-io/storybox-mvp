name: Plan Issue

on:
  workflow_dispatch:
    inputs:
      issue:
        description: 'Issue number to plan'
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Load planning prompt
        id: prompt
        run: |
          { echo 'value<<PROMPT_EOF'; cat .github/prompts/plan-issue.md; echo 'PROMPT_EOF'; } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.prompt.outputs.value }}
          claude_args: '--allowedTools Bash,Read,Glob,Grep --disallowedTools Edit,Write,NotebookEdit --max-turns 40'
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
